# NEO HERMES — Agent Config (inspirado no ECC)
# https://github.com/affaan-m/ecc
# spec_version: 0.1.0
name: neo-hermes
version: 2.0.0
description: "NEO HERMES — Sistema autonomo de orquestracao multi-shell com IA local + cloud, watchdog 24/7, pipeline de agentes, telemetria obrigatoria, compressao de contexto."

license: MIT
repository: https://github.com/guilhermecrepaldi/neo-hermes

# ─── MODELOS ────────────────────────────────────
model:
  preferred:
    provider: deepseek
    model: deepseek-v4-flash
  fallback:
    - provider: ollama
      model: qwen2.5-coder:7b
  routing:
    S3:
      provider: deepseek
      model: deepseek-v4-flash
      cost_per_1m: 1.00
      role: main
    S1:
      provider: ollama
      model: qwen2.5-coder:7b
      cost_per_1m: 0.00
      role: worker
      capabilities:
        - compilar
        - git
        - ls
        - pytest
        - pip
        - shell
        - criar
        - analisar
        - extrair
        - converter

# ─── SHELLZ ─────────────────────────────────────
shellz:
  enabled: true
  force_local: true

# ─── TELEMETRIA ─────────────────────────────────
telemetry:
  enabled: true
  mini_report: true
  rate_per_1m: 1.00  # 1M tok = $1 USD
  show_economy: true

# ─── COMPRESSAO ─────────────────────────────────
compress:
  engine: ollama  # Usa qwen2.5-coder:7b para comprimir contexto
  compress_threshold: 2000  # chars - so comprime acima disso
  model: qwen2.5-coder:7b

# ─── SKILLS ─────────────────────────────────────
skills:
  autoload:
    - shellz-environment
    - skill-router
    - ux-audit
    - stack-docs
    - auto-executor
    - auto-healing
    - output-coeso
    - roteador-economico
    - spec-agent
    - taste-skill
    - design-system-references
    - caveman-hermes
    - last30days
    - cybersec-code-review

# ─── OLLAMA ─────────────────────────────────────
ollama:
  base_url: http://localhost:11434
  model: qwen2.5-coder:7b
  models_disponiveis:
    - qwen2.5-coder:7b
    - llava:7b
    - qwen3-vl:4b
    - nomic-embed-text

# ─── BROWSER ────────────────────────────────────
browser:
  cdp_url: http://localhost:9222
  profile_dir: C:\Users\Home\hermes-chrome-profile

# ─── ENVIRONMENT ────────────────────────────────
env:
  OLLAMA_BASE_URL: http://localhost:11434
  OLLAMA_MODEL: qwen2.5-coder:7b
  HERMES_FORCE_LOCAL_PROCESSING: 1
  LAST30DAYS_DIR: C:\Users\Home\last30days-skill
